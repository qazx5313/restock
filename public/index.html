<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股決策系統 · TW Stock Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<!-- ===== 登入頁面 ===== -->
<div id="page-auth" class="page active">
  <div class="auth-bg">
    <div class="auth-grid"></div>
  </div>
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">▲</span>
      <span class="logo-text">TW<strong>STOCK</strong> PRO</span>
    </div>
    <div class="auth-tagline">主力・技術・資金 整合決策系統</div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登入</button>
      <button class="auth-tab" data-tab="register">註冊</button>
    </div>

    <!-- 登入表單 -->
    <div id="form-login" class="auth-form active">
      <div class="field-group">
        <label>帳號</label>
        <input type="text" id="login-username" placeholder="輸入帳號" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="輸入密碼" autocomplete="current-password" />
      </div>
      <div id="login-error" class="form-error"></div>
      <button id="btn-login" class="btn-primary">登入系統</button>
    </div>

    <!-- 註冊表單 -->
    <div id="form-register" class="auth-form">
      <div class="field-group">
        <label>暱稱</label>
        <input type="text" id="reg-nickname" placeholder="顯示名稱" />
      </div>
      <div class="field-group">
        <label>帳號</label>
        <input type="text" id="reg-username" placeholder="3-20字英數字" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>密碼</label>
        <input type="password" id="reg-password" placeholder="至少6字元" autocomplete="new-password" />
      </div>
      <div id="reg-error" class="form-error"></div>
      <div id="reg-success" class="form-success"></div>
      <button id="btn-register" class="btn-primary">立即註冊</button>
    </div>
  </div>
</div>

<!-- ===== 主系統（需登入+active）===== -->
<div id="page-main" class="page">
  <!-- 頂部導航 -->
  <nav class="top-nav">
    <div class="nav-brand">
      <span class="nav-icon">▲</span>
      <span>TW<strong>STOCK</strong></span>
    </div>
    <div class="nav-center">
      <button class="nav-btn active" data-page="home">大盤雷達</button>
      <button class="nav-btn" data-page="screener">股票篩選</button>
      <button class="nav-btn" data-page="reports">每日報告</button>
    </div>
    <div class="nav-right">
      <span id="nav-username" class="nav-user"></span>
      <button id="btn-logout" class="btn-ghost-sm">登出</button>
    </div>
  </nav>

  <!-- 底部導航（手機）-->
  <nav class="bottom-nav">
    <button class="bnav-btn active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span>大盤</span>
    </button>
    <button class="bnav-btn" data-page="screener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>篩選</span>
    </button>
    <button class="bnav-btn" data-page="stock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>個股</span>
    </button>
    <button class="bnav-btn" data-page="reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>報告</span>
    </button>
    <button class="bnav-btn" data-page="admin" id="bnav-admin" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
      <span>後台</span>
    </button>
  </nav>

  <!-- 頁面容器 -->
  <main class="main-content">

    <!-- ==== 首頁（大盤雷達）==== -->
    <section id="section-home" class="section active">
      <div class="section-header">
        <h1>大盤雷達</h1>
        <span id="market-status-badge" class="status-badge">載入中</span>
      </div>

      <!-- 大盤數據 -->
      <div class="cards-grid-2">
        <div class="card card-dark">
          <div class="card-label">加權指數</div>
          <div id="weighted-value" class="card-value-xl">--</div>
          <div id="weighted-change" class="card-change">--</div>
        </div>
        <div class="card card-dark">
          <div class="card-label">台指期</div>
          <div id="futures-value" class="card-value-xl">--</div>
          <div id="futures-change" class="card-change">--</div>
        </div>
      </div>

      <div class="cards-grid-3">
        <div class="card">
          <div class="card-label">正逆價差</div>
          <div id="premium-value" class="card-value-lg">--</div>
        </div>
        <div class="card">
          <div class="card-label">盤勢判斷</div>
          <div id="market-trend" class="card-value-lg trend-badge">--</div>
        </div>
        <div class="card">
          <div class="card-label">資金狀態</div>
          <div id="flow-status" class="card-value-lg">--</div>
        </div>
      </div>

      <!-- 散戶多空 -->
      <div class="card">
        <div class="card-title">散戶多空指標</div>
        <div class="retail-grid">
          <div class="retail-item long">
            <div class="retail-label">多單口數</div>
            <div id="retail-long" class="retail-value">--</div>
          </div>
          <div class="retail-item short">
            <div class="retail-label">空單口數</div>
            <div id="retail-short" class="retail-value">--</div>
          </div>
          <div class="retail-item neutral">
            <div class="retail-label">多空差</div>
            <div id="retail-diff" class="retail-value">--</div>
          </div>
        </div>
        <div id="retail-judge" class="judge-badge">計算中...</div>
        <div class="retail-bar-wrap">
          <div id="retail-bar" class="retail-bar" style="width:50%"></div>
        </div>
      </div>

      <!-- 資金族群流向 -->
      <div class="card">
        <div class="card-title">族群資金流向</div>
        <div id="sectors-list" class="sectors-list">
          <div class="loading-spinner">載入中...</div>
        </div>
      </div>

      <!-- 功能快捷入口 -->
      <div class="quick-entry-grid">
        <button class="quick-entry" data-page="screener">
          <div class="qe-icon">🔍</div>
          <div class="qe-label">股票篩選</div>
          <div class="qe-desc">找剛轉強個股</div>
        </button>
        <button class="quick-entry" data-page="stock">
          <div class="qe-icon">📈</div>
          <div class="qe-label">個股分析</div>
          <div class="qe-desc">主力+技術</div>
        </button>
        <button class="quick-entry" data-page="reports">
          <div class="qe-icon">📋</div>
          <div class="qe-label">每日報告</div>
          <div class="qe-desc">操作決策</div>
        </button>
        <button class="quick-entry" id="qe-admin" data-page="admin" style="display:none">
          <div class="qe-icon">⚙️</div>
          <div class="qe-label">管理後台</div>
          <div class="qe-desc">系統管理</div>
        </button>
      </div>
    </section>

    <!-- ==== 股票篩選 ==== -->
    <section id="section-screener" class="section">
      <div class="section-header">
        <h1>股票篩選</h1>
        <button id="btn-refresh-screener" class="btn-icon">↻</button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="breakthrough">突破20MA</button>
        <button class="filter-tab" data-filter="limitup">漲停整理</button>
      </div>

      <div id="screener-list" class="screener-list">
        <div class="loading-spinner">篩選中...</div>
      </div>
    </section>

    <!-- ==== 個股分析 ==== -->
    <section id="section-stock" class="section">
      <div class="section-header">
        <h1>個股分析</h1>
      </div>

      <div class="stock-search-bar">
        <input type="text" id="stock-code-input" placeholder="輸入股票代號（如：2330）" />
        <button id="btn-search-stock" class="btn-primary-sm">查詢</button>
      </div>

      <div id="stock-result" class="stock-result">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <div>輸入股票代號開始分析</div>
        </div>
      </div>
    </section>

    <!-- ==== 每日報告 ==== -->
    <section id="section-reports" class="section">
      <div class="section-header">
        <h1>每日報告</h1>
      </div>
      <div id="reports-list" class="reports-list">
        <div class="loading-spinner">載入中...</div>
      </div>
    </section>

    <!-- ==== 管理後台 ==== -->
    <section id="section-admin" class="section">
      <div class="section-header">
        <h1>管理後台</h1>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab active" data-admin-tab="members">會員管理</button>
        <button class="admin-tab" data-admin-tab="reports">報告管理</button>
        <button class="admin-tab" data-admin-tab="params">技術參數</button>
      </div>

      <!-- 會員管理 -->
      <div id="admin-members" class="admin-panel active">
        <div class="admin-toolbar">
          <input type="text" id="member-search" placeholder="搜尋帳號/暱稱" />
          <select id="member-sort">
            <option value="created_at">依註冊時間</option>
            <option value="expires_at">依到期日</option>
          </select>
        </div>
        <div id="members-table-wrap">
          <div class="loading-spinner">載入中...</div>
        </div>
      </div>

      <!-- 報告管理 -->
      <div id="admin-reports" class="admin-panel">
        <div class="admin-toolbar">
          <button id="btn-new-report" class="btn-primary-sm">＋ 新增報告</button>
        </div>
        <div id="admin-reports-list">
          <div class="loading-spinner">載入中...</div>
        </div>
        <!-- 報告編輯表單 -->
        <div id="report-form-wrap" class="report-form-wrap" style="display:none">
          <h3 id="report-form-title">新增報告</h3>
          <div class="field-group">
            <label>標題</label>
            <input type="text" id="rf-title" placeholder="報告標題" />
          </div>
          <div class="field-group">
            <label>日期</label>
            <input type="date" id="rf-date" />
          </div>
          <div class="field-group">
            <label>盤勢判斷</label>
            <select id="rf-trend">
              <option value="bullish">多頭</option>
              <option value="bearish">空頭</option>
              <option value="sideways">震盪</option>
            </select>
          </div>
          <div class="field-group">
            <label>核心摘要</label>
            <textarea id="rf-summary" rows="4" placeholder="資金/主力/風險摘要"></textarea>
          </div>
          <div class="field-group">
            <label>狀態</label>
            <select id="rf-status">
              <option value="draft">草稿</option>
              <option value="published">發布</option>
              <option value="hidden">隱藏</option>
            </select>
          </div>
          <input type="hidden" id="rf-id" />
          <div class="form-actions">
            <button id="btn-save-report" class="btn-primary">儲存</button>
            <button id="btn-cancel-report" class="btn-ghost">取消</button>
          </div>
        </div>
      </div>

      <!-- 技術參數 -->
      <div id="admin-params" class="admin-panel">
        <div class="admin-toolbar">
          <button id="btn-save-params" class="btn-primary-sm">💾 儲存</button>
          <button id="btn-reset-params" class="btn-ghost-sm">↩ 重置</button>
        </div>
        <div id="params-form">
          <div class="loading-spinner">載入中...</div>
        </div>
      </div>
    </section>

  </main>

  <!-- 個股詳情 Modal -->
  <div id="stock-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- 開通會員 Modal -->
  <div id="activate-modal" class="modal-overlay" style="display:none">
    <div class="modal-box modal-sm">
      <h3>開通會員</h3>
      <p id="activate-target-name"></p>
      <div class="activate-days-grid">
        <button class="day-btn" data-days="7">7天</button>
        <button class="day-btn" data-days="30">30天</button>
        <button class="day-btn" data-days="90">90天</button>
        <button class="day-btn" data-days="365">365天</button>
      </div>
      <div class="field-group">
        <label>自訂天數</label>
        <input type="number" id="custom-days" min="1" max="3650" placeholder="輸入天數" />
      </div>
      <input type="hidden" id="activate-user-id" />
      <div class="form-actions">
        <button id="btn-confirm-activate" class="btn-primary">確認開通</button>
        <button id="btn-cancel-activate" class="btn-ghost">取消</button>
      </div>
    </div>
  </div>

</div>

<!-- 待審核頁面 -->
<div id="page-pending" class="page">
  <div class="pending-container">
    <div class="pending-icon">⏳</div>
    <h2>帳號審核中</h2>
    <p>您的帳號已建立，請等待管理員開通。<br/>開通後即可使用完整功能。</p>
    <div id="pending-status" class="pending-status"></div>
    <button id="btn-pending-logout" class="btn-ghost">登出</button>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
